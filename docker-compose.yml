# Speed Tests — Docker Compose
#
# Pré-requisito: criar o diretório de dados antes do primeiro `docker compose up`
#   mkdir -p data
#
# Uso:
#   docker compose up -d          # iniciar em background
#   docker compose logs -f        # acompanhar logs
#   docker compose down           # parar e remover containers

services:
  speed-tests:
    build: .
    container_name: speed-tests
    restart: unless-stopped
    ports:
      - "8020:8020"
    volumes:
      # Código-fonte (hot reload em desenvolvimento)
      - ./backend:/app
      # Protege o node_modules instalado no build do container
      # (evita que o volume acima sobrescreva os módulos)
      - node_modules:/app/node_modules
      # Frontend (servido como estáticos)
      - ./frontend:/app/public
      # Persistência do banco SQLite
      - ./data:/data
      # Arquivo de configuração (somente leitura)
      - ./.env:/app/.env:ro
    env_file:
      - .env

volumes:
  node_modules:
